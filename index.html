<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f0f4f8;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 40px;
    }

    /* Modal styles */
    #exitModal {
      display: none; /* Hidden by default */
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.6);
    }

    #exitModalContent {
      background-color: #fff;
      margin: 15% auto;
      padding: 30px;
      border-radius: 10px;
      width: 80%;
      max-width: 400px;
      text-align: center;
    }

    #exitModal button {
      background-color: #457b9d;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
    }

    #exitModal button:hover {
      background-color: #1d3557;
    }
  </style>
</head>
<body>

  <!-- Colorful Headline -->
  <h1 id="headline">Welcome to Our Amazing Site!</h1>

  <p>Explore our content and don’t miss out!</p>

  <!-- Exit-intent Modal -->
  <div id="exitModal">
    <div id="exitModalContent">
      <h2>Wait! Before You Go…</h2>
      <p>Come back and check out our latest content!</p>
      <button onclick="closeModal()">Stay Here</button>
    </div>
  </div>

  <script>
    // ---------- Colorful Headline ----------
    const colors = ["#e63946", "#f1faee", "#a8dadc", "#457b9d", "#ffb703"];
    const headline = document.getElementById("headline");
    headline.innerHTML = headline.textContent
      .split("")
      .map((char, i) => `<span style="color:${colors[i % colors.length]}">${char}</span>`)
      .join("");

    // ---------- Exit-Intent Popup ----------
    const exitModal = document.getElementById("exitModal");

    function closeModal() {
      exitModal.style.display = "none";
    }

    document.addEventListener("mouseout", function(e) {
      // Only trigger if mouse moves out of the top of the window
      if (!e.toElement && !e.relatedTarget && e.clientY < 50) {
        exitModal.style.display = "block";
      }
    });

    // Optional: close modal if clicked outside the box
    window.addEventListener("click", function(e) {
      if (e.target == exitModal) {
        exitModal.style.display = "none";
      }
    });
  </script>

</body>
</html>
