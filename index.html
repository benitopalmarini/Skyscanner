<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily + Total Skyscanner Counter</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: url('your-background.jpg') no-repeat center center fixed;
        background-size: cover;
        color: white;
        text-align: center;
        padding: 20px;
    }
    #date {
        font-size: 2.2em;
        margin-bottom: 20px;
    }
    #skyscanner {
        font-size: 3em;
        font-weight: bold;
        display: inline-block;
        margin: 30px auto;
        padding: 25px 50px;
        background-color: rgba(0, 0, 0, 0.6);
        border-radius: 12px;
        text-decoration: none;
        color: white;
        transition: transform 0.2s, background-color 0.2s;
    }
    #skyscanner:hover {
        transform: scale(1.1);
        background-color: rgba(0, 0, 0, 0.8);
    }
    .counter {
        font-size: 1.8em;
        margin-top: 20px;
        padding: 15px 25px;
        background-color: rgba(0, 0, 0, 0.6);
        display: inline-block;
        border-radius: 12px;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div id="date"></div>

<a href="#" id="skyscanner" target="_blank">Go to Skyscanner</a>

<div class="counter">Today's Clicks: <span id="dailyCount">Loading...</span></div>
<div class="counter">Total Clicks: <span id="totalCount">Loading...</span></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // ====== FIREBASE CONFIG — replace with your own ======
    const firebaseConfig = {
        apiKey: "FIREBASE_API_KEY",
        authDomain: "FIREBASE_AUTH_DOMAIN",
        databaseURL: "FIREBASE_DATABASE_URL",
        projectId: "FIREBASE_PROJECT_ID",
        storageBucket: "FIREBASE_STORAGE_BUCKET",
        messagingSenderId: "FIREBASE_MESSAGING_SENDER_ID",
        appId: "FIREBASE_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ====== DATE ======
    const dateElement = document.getElementById('date');
    const today = new Date();
    const todayStr = today.toISOString().split('T')[0]; // YYYY-MM-DD
    dateElement.textContent = today.toDateString();

    // ====== COUNTER ELEMENTS ======
    const dailyCountElement = document.getElementById('dailyCount');
    const totalCountElement = document.getElementById('totalCount');
    const skyscannerLink = document.getElementById('skyscanner');

    // ====== DATABASE REFS ======
    const dailyRef = database.ref('dailyClicks/' + todayStr);
    const totalRef = database.ref('totalClicks');

    // ====== LOAD COUNTS ======
    dailyRef.get().then(snapshot => {
        dailyCountElement.textContent = snapshot.exists() ? snapshot.val() : 0;
    });
    totalRef.get().then(snapshot => {
        totalCountElement.textContent = snapshot.exists() ? snapshot.val() : 0;
    });

    // ====== HANDLE CLICK ======
    skyscannerLink.addEventListener('click', async () => {
        // Daily increment
        const dailySnap = await dailyRef.get();
        let dailyVal = dailySnap.exists() ? dailySnap.val() : 0;
        dailyVal++;
        dailyRef.set(dailyVal);
        dailyCountElement.textContent = dailyVal;

        // Total increment
        const totalSnap = await totalRef.get();
        let totalVal = totalSnap.exists() ? totalSnap.val() : 0;
        totalVal++;
        totalRef.set(totalVal);
        totalCountElement.textContent = totalVal;

        // Open Skyscanner
        window.open("https://www.skyscanner.com", "_blank");
    });
</script>

</body>
</html>
