<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Find Cheap Flights Now</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #0f62fe, #001d6c);
    color: white;
    text-align: center;
}

.container {
    padding: 60px 20px;
}

h1, h2 {
    cursor: pointer;
}

h1 {
    font-size: 60px;
    margin-bottom: 20px;
}

h2 {
    font-size: 32px;
    margin-bottom: 40px;
}

.button {
    display: inline-block;
    padding: 20px 50px;
    margin: 15px;
    font-size: 26px;
    font-weight: bold;
    background-color: #ffcc00;
    color: #000;
    text-decoration: none;
    border-radius: 12px;
    transition: 0.3s;
}

.button:hover {
    background-color: #ffaa00;
    transform: scale(1.05);
}

.counter-box {
    margin-top: 40px;
    font-size: 24px;
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 10px;
    display: inline-block;
}

.date {
    font-size: 20px;
    margin-top: 15px;
}

.destinations {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

.destinations a {
    display: block;
    width: 180px;
    height: 120px;
    text-decoration: none;
    color: black;
    font-weight: bold;
    font-size: 18px;
    background-color: #ffcc00;
    color: #000;
    border-radius: 12px;
    line-height: 120px;
    transition: 0.3s;
}

.destinations a:hover {
    background-color: #ffaa00;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<h1 id="mainTitle" onclick="trackClick()">🔥 Find The Cheapest Flights Today 🔥</h1>
<h2 id="subTitle" onclick="trackClick()">Compare Hundreds of Airlines in Seconds</h2>

<a href="https://convert.ctypy.com/aff_c?offer_id=29465&aff_id=21885" 
   class="button" 
   onclick="trackClick()" 
   target="_blank">
   SEARCH FLIGHTS NOW
</a>

<br>

<a href="https://convert.ctypy.com/aff_c?offer_id=29465&aff_id=21885" 
   class="button" 
   onclick="trackClick()" 
   target="_blank">
   GET EXCLUSIVE TRAVEL DEALS
</a>

<div class="destinations" id="destinations">
   <!-- Destinations will be populated dynamically -->
</div>

<div class="counter-box">
    🚀 Total Clicks Today: <span id="clickCount">0</span>
</div>

<div class="date">
    📅 Today’s Date: <span id="todayDate"></span>
</div>

</div>

<script>
// Click counter
let clicks = 0;
function trackClick() {
    clicks++;
    document.getElementById("clickCount").innerText = clicks;
    window.open("https://convert.ctypy.com/aff_c?offer_id=29465&aff_id=21885", "_blank");
}

// Set today's date
document.getElementById("todayDate").innerText = new Date().toDateString();

// Flight destinations
const popularDestinations = [
    "New York", "London", "Paris", "Dubai", "Tokyo",
    "Bangkok", "Sydney", "Barcelona", "Rome", "Istanbul"
];

const destinationsContainer = document.getElementById("destinations");
popularDestinations.forEach(dest => {
    const a = document.createElement("a");
    a.href = "https://convert.ctypy.com/aff_c?offer_id=29465&aff_id=21885";
    a.target = "_blank";
    a.onclick = trackClick;
    a.innerText = dest;
    destinationsContainer.appendChild(a);
});

// Language conversion based on browser
const translations = {
    "es": {
        mainTitle: "🔥 Encuentra los vuelos más baratos hoy 🔥",
        subTitle: "Compara cientos de aerolíneas en segundos",
        button1: "BUSCAR VUELOS AHORA",
        button2: "OBTENER OFERTAS EXCLUSIVAS"
    },
    "fr": {
        mainTitle: "🔥 Trouvez les vols les moins chers aujourd'hui 🔥",
        subTitle: "Comparez des centaines de compagnies aériennes en quelques secondes",
        button1: "RECHERCHER DES VOLS",
        button2: "OBTENIR DES OFFRES EXCLUSIVES"
    },
    "de": {
        mainTitle: "🔥 Finde die günstigsten Flüge heute 🔥",
        subTitle: "Vergleiche Hunderte von Airlines in Sekunden",
        button1: "FLÜGE SUCHEN",
        button2: "EXKLUSIVE ANGEBOTE"
    }
};

const userLang = navigator.language.slice(0,2);
if(translations[userLang]) {
    document.getElementById("mainTitle").innerText = translations[userLang].mainTitle;
    document.getElementById("subTitle").innerText = translations[userLang].subTitle;
    document.querySelectorAll(".button")[0].innerText = translations[userLang].button1;
    document.querySelectorAll(".button")[1].innerText = translations[userLang].button2;
}
</script>

</body>
</html>
