<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find The Cheapest Flights Here Online</title>
<meta name="description" content="Find the cheapest flights online. Compare airlines instantly and book low fares today.">
<meta name="viewport" content="width=1200">

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #0f62fe, #003c8f);
    color: white;
    text-align: center;
}
.container { padding: 50px 20px; }
.top-date { font-size: 20px; margin-bottom: 10px; }
.logo { font-size: 70px; font-weight: 900; color: #ffcc00; }
h1 { font-size: 54px; margin: 20px 0; }
.subtext { font-size: 22px; margin-bottom: 40px; }
.cta-button {
    display: inline-block;
    padding: 22px 60px;
    font-size: 30px;
    font-weight: bold;
    background-color: #ffcc00;
    color: black;
    text-decoration: none;
    border-radius: 8px;
    margin: 15px;
    transition: 0.3s;
}
.cta-button:hover {
    background-color: white;
    transform: scale(1.08);
}
.counter-box {
    margin-top: 40px;
    font-size: 20px;
    background: rgba(0,0,0,0.2);
    padding: 15px;
    border-radius: 6px;
    display: inline-block;
}
.country-highlight {
    color: #ffcc00;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="top-date" id="liveDate"></div>

<div class="logo">SKYSCANNER</div>

<h1 id="headline">Find The Cheapest Flights Here Online</h1>

<div class="subtext" id="subtext">
Compare hundreds of airlines instantly and book the lowest fares available today.
</div>

<a href="https://convert.ctypy.com/aff_c?offer_id=29465&aff_id=21885"
   class="cta-button"
   onclick="trackClick()"
   id="cta1">
SEARCH FLIGHTS NOW
</a>

<a href="https://convert.ctypy.com/aff_c?offer_id=29465&aff_id=21885"
   class="cta-button"
   onclick="trackClick()"
   id="cta2">
VIEW TODAY'S BEST DEALS
</a>

<div class="counter-box">
Today's Clicks: <span id="clickCount">0</span>
</div>

</div>

<script>

// -------- LIVE DATE --------
const today = new Date();
document.getElementById("liveDate").innerHTML =
today.toLocaleDateString(navigator.language, {
weekday: 'long',
year: 'numeric',
month: 'long',
day: 'numeric'
});

// -------- COUNTRY DETECTION --------
fetch("https://ipapi.co/json/")
.then(response => response.json())
.then(data => {

let country = data.country_name;
let currency = data.currency;

if(country){

document.getElementById("subtext").innerHTML =
"Compare hundreds of airlines in <span class='country-highlight'>" +
country +
"</span> and book the lowest fares in " + currency + " today.";

document.title = "Cheap Flights in " + country + " | Find The Cheapest Flights Here Online";

let meta = document.querySelector("meta[name='description']");
meta.setAttribute("content",
"Find the cheapest flights in " + country +
". Compare airlines and book low fares online today.");

}

});

// -------- DAILY COUNTER --------
function trackClick() {
const now = new Date().toDateString();
let storedDate = localStorage.getItem("clickDate");
let count = localStorage.getItem("dailyClicks");

if (storedDate !== now) {
localStorage.setItem("clickDate", now);
localStorage.setItem("dailyClicks", 0);
count = 0;
}

count++;
localStorage.setItem("dailyClicks", count);
document.getElementById("clickCount").innerText = count;
}

window.onload = function() {
const now = new Date().toDateString();
let storedDate = localStorage.getItem("clickDate");
let count = localStorage.getItem("dailyClicks");

if (storedDate !== now) {
localStorage.setItem("clickDate", now);
localStorage.setItem("dailyClicks", 0);
count = 0;
}

document.getElementById("clickCount").innerText = count || 0;
}

</script>

</body>
</html>
